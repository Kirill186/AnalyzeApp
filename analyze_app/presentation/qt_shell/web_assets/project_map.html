<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Project Map</title>
  <style>
    :root {
      --bg0: #070b17;
      --bg1: #0f1730;
      --surface: rgba(255, 255, 255, 0.06);
      --surface-strong: rgba(255, 255, 255, 0.1);
      --stroke: rgba(255, 255, 255, 0.14);
      --text: rgba(240, 246, 255, 0.95);
      --muted: rgba(196, 210, 235, 0.82);
      --file: #76a8ff;
      --class: #8deec8;
      --function: #f6c075;
      --danger: #ff8f8f;
      --ok: #8deec8;
      --warn: #f7cf7a;
      --cold: #6fa6ff;
      --hot: #ff6d6d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      background: radial-gradient(1300px 900px at 15% 0%, #1b2753 0%, var(--bg1) 38%, var(--bg0) 100%);
      color: var(--text);
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      overflow: hidden;
    }

    .layout {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(420px, 2fr) minmax(300px, 1fr);
      gap: 14px;
      padding: 14px;
    }

    .card {
      border: 1px solid var(--stroke);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.03));
      backdrop-filter: blur(8px);
      box-shadow: 0 16px 44px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      min-height: 0;
    }

    .left {
      display: grid;
      grid-template-rows: auto auto 1fr;
    }

    .toolbar,
    .summary {
      border-bottom: 1px solid var(--stroke);
      padding: 12px 14px;
    }

    .title {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .mode-switch {
      display: inline-flex;
      border: 1px solid var(--stroke);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.22);
      padding: 3px;
      gap: 4px;
    }

    .mode-btn {
      border: 0;
      color: var(--muted);
      background: transparent;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      transition: 0.18s ease;
    }

    .mode-btn.active {
      background: rgba(255, 255, 255, 0.16);
      color: #f0f6ff;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      border: 1px solid var(--stroke);
      border-radius: 999px;
      font-size: 11px;
      color: var(--muted);
      padding: 5px 9px;
      background: rgba(0, 0, 0, 0.2);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 8px 10px;
    }

    .metric .label {
      font-size: 11px;
      color: var(--muted);
    }

    .metric .value {
      margin-top: 4px;
      font-size: 18px;
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }

    #graph {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.27));
    }

    #graph.dragging {
      cursor: grabbing;
    }

    .right {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      min-height: 0;
    }

    .panel-title {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.2px;
      text-transform: uppercase;
    }

    .details,
    .legend,
    .related,
    .empty {
      padding: 12px 14px;
      border-bottom: 1px solid var(--stroke);
    }

    .details h3 {
      margin: 8px 0 4px;
      font-size: 18px;
      line-height: 1.28;
      word-break: break-word;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      word-break: break-word;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .tag {
      font-size: 11px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.22);
      color: #d7e7ff;
    }

    .legend-list {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .legend-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .related {
      border-bottom: 0;
      overflow: auto;
      min-height: 0;
    }

    .related-list {
      margin-top: 10px;
      display: grid;
      gap: 7px;
    }

    .related-item {
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, 0.04);
      border-radius: 10px;
      padding: 8px;
      font-size: 12px;
    }

    .related-item b {
      font-weight: 700;
    }

    .footer {
      border-top: 1px solid var(--stroke);
      padding: 10px 14px;
      color: var(--muted);
      font-size: 11px;
      background: rgba(0, 0, 0, 0.16);
    }

    .empty {
      display: none;
      text-align: center;
      color: var(--muted);
      padding-top: 30px;
      line-height: 1.5;
    }

    .loader {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(240, 246, 255, 0.22);
      border-top-color: var(--file);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .kbd {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      border: 1px solid var(--stroke);
      background: rgba(0, 0, 0, 0.22);
      border-radius: 7px;
      padding: 2px 6px;
      color: #e2ecff;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(330px, 1fr) minmax(300px, 1fr);
      }
      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <section class="card left">
      <header class="toolbar">
        <div>
          <h1 class="title">Интерактивная карта проекта</h1>
          <p class="subtitle">Граф: module/file → class → function. Клик по узлу показывает зависимости и метрики.</p>
        </div>
        <div class="mode-switch" role="tablist" aria-label="View mode">
          <button class="mode-btn" data-mode="structural">Structural view</button>
          <button class="mode-btn" data-mode="hotspot">Hotspot overlay</button>
        </div>
      </header>
      <div class="summary" id="summary"></div>
      <canvas id="graph"></canvas>
    </section>

    <aside class="card right">
      <section class="details" id="details"></section>
      <section class="legend">
        <h2 class="panel-title">Легенда</h2>
        <div class="legend-list">
          <div class="legend-item"><span><i class="dot" style="background:var(--file)"></i> file / module</span><span class="kbd">корневые узлы</span></div>
          <div class="legend-item"><span><i class="dot" style="background:var(--class)"></i> class</span><span class="kbd">потомки file</span></div>
          <div class="legend-item"><span><i class="dot" style="background:var(--function)"></i> function</span><span class="kbd">методы и функции</span></div>
        </div>
      </section>
      <section class="related">
        <h2 class="panel-title">Связанные узлы</h2>
        <div class="related-list" id="related"></div>
      </section>
      <section class="footer" id="status"></section>
      <div class="empty" id="empty">Нет данных графа.<br/>Выбери репозиторий и запусти анализ карты проекта.</div>
    </aside>
  </div>

  <script>
    const payload = __DATA_JSON__ || { nodes: [], edges: [], mode: 'Structural view' };
    const loading = Boolean(payload.loading);

    const MODE = {
      STRUCTURAL: 'structural',
      HOTSPOT: 'hotspot',
    };

    const state = {
      mode: payload.mode === 'Hotspot overlay' ? MODE.HOTSPOT : MODE.STRUCTURAL,
      nodes: (payload.nodes || []).map((node, index) => ({
        ...node,
        hotspot: Number(node.hotspot ?? 0),
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        radius: 6,
        index,
      })),
      edges: payload.edges || [],
      selectedNodeId: null,
      hoveredNodeId: null,
      camera: { x: 0, y: 0, scale: 1 },
    };

    const nodeById = new Map(state.nodes.map((n) => [n.id, n]));
    const outgoing = new Map();
    const incoming = new Map();
    state.edges.forEach((edge) => {
      if (!outgoing.has(edge.source)) outgoing.set(edge.source, []);
      if (!incoming.has(edge.target)) incoming.set(edge.target, []);
      outgoing.get(edge.source).push(edge.target);
      incoming.get(edge.target).push(edge.source);
    });

    const canvas = document.getElementById('graph');
    const ctx = canvas.getContext('2d');
    const detailsEl = document.getElementById('details');
    const relatedEl = document.getElementById('related');
    const statusEl = document.getElementById('status');
    const summaryEl = document.getElementById('summary');
    const emptyEl = document.getElementById('empty');
    const modeButtons = [...document.querySelectorAll('.mode-btn')];

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));

    function colorForKind(kind) {
      if (kind === 'file' || kind === 'module') return getComputedStyle(document.documentElement).getPropertyValue('--file').trim();
      if (kind === 'class') return getComputedStyle(document.documentElement).getPropertyValue('--class').trim();
      return getComputedStyle(document.documentElement).getPropertyValue('--function').trim();
    }

    function hotspotColor(score, maxHotspot) {
      const cold = { r: 111, g: 166, b: 255 };
      const hot = { r: 255, g: 109, b: 109 };
      const t = maxHotspot <= 0 ? 0 : clamp(score / maxHotspot, 0, 1);
      const r = Math.round(cold.r + (hot.r - cold.r) * t);
      const g = Math.round(cold.g + (hot.g - cold.g) * t);
      const b = Math.round(cold.b + (hot.b - cold.b) * t);
      return `rgb(${r},${g},${b})`;
    }

    function initializePositions() {
      const w = canvas.clientWidth || 800;
      const h = canvas.clientHeight || 500;
      const cols = Math.max(1, Math.floor(Math.sqrt(state.nodes.length)));
      state.nodes.forEach((node, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const jitterX = (Math.random() - 0.5) * 80;
        const jitterY = (Math.random() - 0.5) * 70;
        node.x = (col + 0.5) * (w / cols) + jitterX;
        node.y = (row + 0.6) * 90 + jitterY;
        node.vx = (Math.random() - 0.5) * 0.8;
        node.vy = (Math.random() - 0.5) * 0.8;
      });
    }

    function applyLayoutForces() {
      const repulsion = 9000;
      const attraction = 0.011;
      const idealEdgeLength = 120;
      const damping = 0.9;

      for (let i = 0; i < state.nodes.length; i += 1) {
        const a = state.nodes[i];
        for (let j = i + 1; j < state.nodes.length; j += 1) {
          const b = state.nodes[j];
          let dx = a.x - b.x;
          let dy = a.y - b.y;
          let distSq = dx * dx + dy * dy;
          if (distSq < 20) distSq = 20;
          const force = repulsion / distSq;
          const dist = Math.sqrt(distSq);
          dx /= dist;
          dy /= dist;
          a.vx += dx * force;
          a.vy += dy * force;
          b.vx -= dx * force;
          b.vy -= dy * force;
        }
      }

      state.edges.forEach((edge) => {
        const source = nodeById.get(edge.source);
        const target = nodeById.get(edge.target);
        if (!source || !target) return;
        const dx = target.x - source.x;
        const dy = target.y - source.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const stretch = dist - idealEdgeLength;
        const force = stretch * attraction;
        const nx = dx / dist;
        const ny = dy / dist;
        source.vx += nx * force;
        source.vy += ny * force;
        target.vx -= nx * force;
        target.vy -= ny * force;
      });

      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      state.nodes.forEach((node) => {
        node.vx *= damping;
        node.vy *= damping;
        node.x += node.vx;
        node.y += node.vy;
        node.x = clamp(node.x, 25, width - 25);
        node.y = clamp(node.y, 25, height - 25);
      });
    }

    function drawGraph() {
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);

      const maxHotspot = Math.max(...state.nodes.map((n) => n.hotspot), 0);

      ctx.save();
      ctx.translate(state.camera.x, state.camera.y);
      ctx.scale(state.camera.scale, state.camera.scale);

      state.edges.forEach((edge) => {
        const source = nodeById.get(edge.source);
        const target = nodeById.get(edge.target);
        if (!source || !target) return;
        const selected = state.selectedNodeId && (edge.source === state.selectedNodeId || edge.target === state.selectedNodeId);
        ctx.beginPath();
        ctx.moveTo(source.x, source.y);
        ctx.lineTo(target.x, target.y);
        ctx.lineWidth = selected ? 1.7 : 1.0;
        ctx.strokeStyle = selected ? 'rgba(255,255,255,0.5)' : 'rgba(180,200,235,0.2)';
        ctx.stroke();
      });

      state.nodes.forEach((node) => {
        const baseRadius = node.kind === 'file' ? 11 : node.kind === 'class' ? 9 : 7;
        const hotspotBoost = state.mode === MODE.HOTSPOT ? clamp(node.hotspot / (maxHotspot || 1), 0, 1) * 5 : 0;
        const radius = baseRadius + hotspotBoost;
        node.radius = radius;

        const hovered = node.id === state.hoveredNodeId;
        const selected = node.id === state.selectedNodeId;
        const fill = state.mode === MODE.HOTSPOT
          ? hotspotColor(node.hotspot, maxHotspot)
          : colorForKind(node.kind);

        if (selected || hovered) {
          ctx.beginPath();
          ctx.arc(node.x, node.y, radius + 5, 0, Math.PI * 2);
          ctx.fillStyle = selected ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.12)';
          ctx.fill();
        }

        ctx.beginPath();
        ctx.arc(node.x, node.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = fill;
        ctx.fill();

        ctx.lineWidth = selected ? 2.2 : 1;
        ctx.strokeStyle = selected ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.22)';
        ctx.stroke();
      });

      ctx.restore();
    }

    function updateSummary() {
      const total = state.nodes.length;
      const files = state.nodes.filter((n) => n.kind === 'file' || n.kind === 'module').length;
      const classes = state.nodes.filter((n) => n.kind === 'class').length;
      const functions = state.nodes.filter((n) => n.kind === 'function').length;
      const hotspotMax = Math.max(...state.nodes.map((n) => n.hotspot), 0);

      summaryEl.innerHTML = [
        ['Nodes', total],
        ['Edges', state.edges.length],
        ['Files/Modules', files],
        ['Classes', classes],
        ['Functions', functions],
        ['Max hotspot', hotspotMax],
        ['Selected mode', state.mode === MODE.HOTSPOT ? 'hotspot' : 'structural'],
        ['Coverage', total ? `${Math.round((functions / total) * 100)}% fn nodes` : '0%'],
      ].map(([label, value]) => `
          <div class="metric">
            <div class="label">${label}</div>
            <div class="value">${value}</div>
          </div>
      `).join('');
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function setSelectedNode(nodeId) {
      state.selectedNodeId = nodeId;
      const node = nodeId ? nodeById.get(nodeId) : null;
      if (!node) {
        detailsEl.innerHTML = `
          <h2 class="panel-title">Детали узла</h2>
          <h3>Ничего не выбрано</h3>
          <p class="muted">Кликни по узлу на графе чтобы увидеть связи, уровень вложенности и hotspot score.</p>
        `;
        relatedEl.innerHTML = '<div class="muted">Нет связей для отображения.</div>';
        return;
      }

      const out = outgoing.get(node.id) || [];
      const inc = incoming.get(node.id) || [];
      const kindTag = node.kind.toUpperCase();
      detailsEl.innerHTML = `
        <h2 class="panel-title">Детали узла</h2>
        <h3>${escapeHtml(node.label)}</h3>
        <div class="muted">${escapeHtml(node.path)}</div>
        <div class="tags">
          <span class="tag">kind: ${escapeHtml(kindTag)}</span>
          <span class="tag">hotspot: ${node.hotspot}</span>
          <span class="tag">outgoing: ${out.length}</span>
          <span class="tag">incoming: ${inc.length}</span>
        </div>
      `;

      const relatedIds = [...new Set([...out, ...inc])].slice(0, 30);
      relatedEl.innerHTML = relatedIds.length
        ? relatedIds.map((id) => {
          const related = nodeById.get(id);
          if (!related) {
            return `<div class="related-item"><b>${escapeHtml(id)}</b><div class="muted">Внешний модуль (не в parsed nodes)</div></div>`;
          }
          return `
            <div class="related-item">
              <b>${escapeHtml(related.label)}</b>
              <div class="muted">${escapeHtml(related.kind)} · ${escapeHtml(related.path)}</div>
            </div>
          `;
        }).join('')
        : '<div class="muted">У выбранного узла пока нет видимых связей.</div>';
    }

    function pickNodeAt(screenX, screenY) {
      const worldX = (screenX - state.camera.x) / state.camera.scale;
      const worldY = (screenY - state.camera.y) / state.camera.scale;
      for (let i = state.nodes.length - 1; i >= 0; i -= 1) {
        const node = state.nodes[i];
        const dx = worldX - node.x;
        const dy = worldY - node.y;
        if (dx * dx + dy * dy <= (node.radius + 3) * (node.radius + 3)) {
          return node;
        }
      }
      return null;
    }

    function applyMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        button.classList.toggle('active', button.dataset.mode === mode);
      });
      updateSummary();
      const modeLabel = mode === MODE.HOTSPOT ? 'Hotspot overlay' : 'Structural view';
      statusEl.textContent = `Mode: ${modeLabel}. Управление: drag для панорамы, wheel для zoom, click по узлу для деталей.`;
    }

    function bindInteractions() {
      modeButtons.forEach((button) => {
        button.addEventListener('click', () => applyMode(button.dataset.mode));
      });

      let dragging = false;
      let lastX = 0;
      let lastY = 0;

      canvas.addEventListener('mousedown', (event) => {
        dragging = true;
        canvas.classList.add('dragging');
        lastX = event.clientX;
        lastY = event.clientY;
      });

      window.addEventListener('mouseup', () => {
        dragging = false;
        canvas.classList.remove('dragging');
      });

      canvas.addEventListener('mousemove', (event) => {
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;

        if (dragging) {
          const dx = event.clientX - lastX;
          const dy = event.clientY - lastY;
          state.camera.x += dx;
          state.camera.y += dy;
          lastX = event.clientX;
          lastY = event.clientY;
          return;
        }

        const hovered = pickNodeAt(x, y);
        state.hoveredNodeId = hovered ? hovered.id : null;
      });

      canvas.addEventListener('mouseleave', () => {
        state.hoveredNodeId = null;
      });

      canvas.addEventListener('click', (event) => {
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const node = pickNodeAt(x, y);
        setSelectedNode(node ? node.id : null);
      });

      canvas.addEventListener('wheel', (event) => {
        event.preventDefault();
        const direction = event.deltaY > 0 ? -0.09 : 0.09;
        const prevScale = state.camera.scale;
        state.camera.scale = clamp(state.camera.scale + direction, 0.4, 2.4);

        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;

        const wx = (x - state.camera.x) / prevScale;
        const wy = (y - state.camera.y) / prevScale;

        state.camera.x = x - wx * state.camera.scale;
        state.camera.y = y - wy * state.camera.scale;
      }, { passive: false });

      window.addEventListener('resize', () => {
        drawGraph();
      });
    }

    function tick() {
      applyLayoutForces();
      drawGraph();
      requestAnimationFrame(tick);
    }

    function bootstrap() {
      if (loading) {
        emptyEl.innerHTML = '<span class="loader"></span><br/>Building project map...';
        emptyEl.style.display = 'block';
      } else if (!state.nodes.length) {
        emptyEl.style.display = 'block';
      }

      initializePositions();
      updateSummary();
      setSelectedNode(state.nodes[0] ? state.nodes[0].id : null);
      applyMode(state.mode);
      bindInteractions();
      tick();
    }

    bootstrap();
  </script>
</body>
</html>
