<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root{color-scheme:dark;--bg:#091226;--panel:#121d37;--stroke:#2c3f6b;--text:#eaf0ff;--muted:#9bb0d6;--accent:#7eb0ff}
html,body{height:100%}
body{font-family:Inter,Segoe UI,sans-serif;background:radial-gradient(900px 700px at 10% 8%, #17366e, #0a1020 45%, #070b15);color:var(--text);margin:0;padding:16px}
.grid{display:grid;grid-template-columns:1.05fr 1.2fr .95fr;gap:14px;min-height:calc(100vh - 32px)}
.panel{background:linear-gradient(180deg, rgba(20,31,59,.86), rgba(10,17,34,.78));border:1px solid var(--stroke);border-radius:16px;padding:14px;backdrop-filter: blur(8px)}
.title{font-size:15px;font-weight:700;margin:0 0 12px}
.feed{display:grid;gap:10px;max-height:calc(100vh - 90px);overflow:auto;padding-right:4px}
.item{display:block;text-decoration:none;color:inherit;padding:10px;border:1px solid #2b406b;border-radius:12px;background:rgba(255,255,255,.03);transition:.2s}
.item:hover{border-color:#4e77c2;transform:translateY(-1px)}
.item.active{border-color:var(--accent);box-shadow:0 0 0 1px rgba(126,176,255,.35) inset}
.hash{font-weight:700;color:#9ec1ff;font-size:13px}.meta{font-size:12px;color:var(--muted);margin-top:2px}.msg{margin-top:6px;font-size:13px;line-height:1.35}
#graph{width:100%;height:calc(100vh - 90px);display:block;border-radius:12px;background:rgba(8,13,26,.8);border:1px solid #23385f}
.details{display:none}.details.open{display:block}
.badge{display:inline-block;font-size:11px;padding:4px 8px;border-radius:999px;background:#1f2f55;color:#b7cefb;border:1px solid #34548f}
.desc{margin-top:10px;line-height:1.45;color:#d7e3ff;white-space:pre-wrap}
.ai{margin-top:14px;padding:10px;border:1px solid #385d9f;border-radius:12px;background:rgba(46,86,165,.15)}
.ai a{display:inline-block;margin-top:8px;color:#b8d0ff;text-decoration:none;border:1px solid #5f84cb;border-radius:10px;padding:6px 10px}
.ai a:hover{background:rgba(95,132,203,.22)}
.empty{color:var(--muted)}
@media (max-width:1200px){.grid{grid-template-columns:1fr}.feed,#graph{max-height:380px;height:380px}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const data = __DATA_JSON__;
const commits = data.commits || [];
let selected = data.selectedHash || (commits.length ? commits[0].hash : null);

function shortText(text, limit=96){ return text.length > limit ? text.slice(0, limit) + '…' : text; }
function esc(text){
  return (text || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
}

function render(){
  const list = commits.map((c, idx) => `
    <a class="item ${selected===c.hash?'active':''}" href="#" data-hash="${c.hash}" onclick="return pickCommit(event, '${c.hash}', ${idx})">
      <div class="hash">${c.shortHash}</div>
      <div class="meta">${esc(c.author)} • ${esc(c.date)}</div>
      <div class="msg">${esc(shortText(c.message || '(без сообщения)'))}</div>
    </a>`).join('');

  const commit = commits.find(c => c.hash === selected);
  const details = !commit ? `<div class="empty">Выберите коммит в ленте слева.</div>` : `
    <div class="details open">
      <div class="badge">${esc(commit.shortHash)}</div>
      <h3 style="margin:10px 0 4px">${esc(commit.message || '(без сообщения)')}</h3>
      <div class="meta">${esc(commit.author)} • ${esc(commit.date)}</div>
      <div class="desc">${esc(commit.description || 'Описание коммита недоступно. Для детального анализа сгенерируйте AI-описание.')}</div>
      <div class="ai">
        💡 Хотите получить развёрнутое объяснение изменений?
        <br/><a href="#" onclick="return requestAi(event, '${commit.hash}')">Сгенерировать описание от AI</a>
      </div>
    </div>`;

  document.getElementById('app').innerHTML = `
    <div class="grid">
      <section class="panel"><h3 class="title">Лента коммитов</h3><div class="feed">${list || '<div class="empty">Нет коммитов</div>'}</div></section>
      <section class="panel"><h3 class="title">Граф коммитов</h3><canvas id="graph"></canvas></section>
      <section class="panel"><h3 class="title">Описание выбранного коммита</h3>${details}</section>
    </div>`;

  drawGraph();
}

function pickCommit(event, hash, index){
  event.preventDefault();
  selected = hash;
  render();
  window.location.href = `analyzeapp://select/${hash}`;
  return false;
}

function requestAi(event, hash){
  event.preventDefault();
  window.location.href = `analyzeapp://ai/${hash}`;
  return false;
}

function drawGraph(){
  const canvas = document.getElementById('graph');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = Math.floor(w*dpr); canvas.height = Math.floor(h*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);

  const count = Math.max(1, commits.length);
  const nodes = commits.map((c, i) => {
    const t = count === 1 ? 0.5 : i/(count-1);
    return {
      x: 80 + Math.sin(i*0.7)*18 + (w-160)*t,
      y: h*0.5 + Math.cos(i*1.2)*Math.min(90,h*0.22),
      hash: c.hash,
      active: c.hash===selected
    };
  });

  ctx.lineWidth = 2;
  for(let i=0;i<nodes.length-1;i++){
    const a = nodes[i], b = nodes[i+1];
    const grad = ctx.createLinearGradient(a.x,a.y,b.x,b.y);
    grad.addColorStop(0,'rgba(126,176,255,.75)');
    grad.addColorStop(1,'rgba(111,255,197,.75)');
    ctx.strokeStyle = grad;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  }
  for(const n of nodes){
    ctx.beginPath();
    ctx.fillStyle = n.active ? '#7bffd6' : '#9ec1ff';
    ctx.shadowColor = n.active ? 'rgba(123,255,214,.55)' : 'rgba(158,193,255,.35)';
    ctx.shadowBlur = n.active ? 14 : 7;
    ctx.arc(n.x,n.y,n.active?7:5,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

render();
addEventListener('resize', drawGraph, {passive:true});
</script>
</body>
</html>
