<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root{color-scheme:dark;--stroke:#294574;--text:#eff4ff;--muted:#9fb4d6;--accent:#74a8ff}
html,body{height:100%;margin:0}
*{box-sizing:border-box}
body{font-family:Inter,Segoe UI,sans-serif;color:var(--text);background:radial-gradient(1000px 800px at 15% 5%, #163163, #090f1e 45%, #050912);padding:10px}
.layout{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:10px;height:100%;min-height:0}
.panel{min-height:0;border:1px solid var(--stroke);border-radius:14px;background:linear-gradient(170deg, rgba(19,31,58,.85), rgba(9,14,28,.84));padding:10px}
.title{margin:0 0 8px;font-size:13px;font-weight:700;color:#cfe0ff}
.graph-shell{height:100%;display:flex;flex-direction:column;min-height:0}
.graph-scroll{flex:1;min-height:0;overflow:auto;border:1px solid #223a64;border-radius:12px;background:linear-gradient(180deg, rgba(7,12,22,.95), rgba(7,15,30,.8));padding:8px}
#graph{display:block;width:100%;min-width:680px}
.side{display:grid;grid-template-rows:minmax(220px,1fr) minmax(220px,1fr);gap:10px;min-height:0}
.ribbon-wrap,.details-wrap{min-height:0;display:flex;flex-direction:column}
.ribbon{overflow:auto;display:flex;flex-direction:column;gap:8px;padding-right:4px;flex:1;min-height:0}
.r-item{border:1px solid #2d4772;border-radius:12px;padding:10px;cursor:pointer;background:rgba(255,255,255,.02)}
.r-item:hover{border-color:#5f87ca}.r-item.active{border-color:var(--accent);box-shadow:0 0 0 1px rgba(116,168,255,.45) inset}
.hash{font-size:12px;font-weight:700;color:#a9c8ff}.meta{margin-top:2px;font-size:11px;color:var(--muted)}.msg{margin-top:6px;font-size:12px;line-height:1.35}
.details{overflow:auto;flex:1;min-height:0}
.badge{display:inline-block;padding:4px 9px;border-radius:999px;background:#1a2d50;border:1px solid #3d609e;font-size:11px;color:#b8d0ff}
.desc{margin-top:10px;white-space:pre-wrap;line-height:1.45;color:#dce7ff}
.action{margin-top:14px;padding:10px;border-radius:12px;border:1px solid #3b5f9f;background:rgba(52,92,168,.14);font-size:13px}
.action button{margin-top:8px;padding:8px 12px;border-radius:10px;border:1px solid #6990d5;background:#1a3057;color:#ddebff;cursor:pointer}
.empty{color:var(--muted)}.commit-card{cursor:pointer}
@media (max-width:860px){.layout{grid-template-columns:1fr;grid-template-rows:1fr 420px}.side{grid-template-rows:1fr 1fr}}
</style>
</head>
<body>
<div class="layout">
  <section class="panel graph-shell">
    <h3 class="title">Tree / Graph коммитов</h3>
    <div id="graphScroll" class="graph-scroll"><svg id="graph"></svg></div>
  </section>
  <section class="panel side">
    <div class="ribbon-wrap">
      <h3 class="title">Вертикальная лента коммитов</h3>
      <div id="ribbon" class="ribbon"></div>
    </div>
    <div class="details-wrap">
      <h3 class="title">Информация о коммите</h3>
      <div id="details" class="details"></div>
    </div>
  </section>
</div>
<script>
const data = __DATA_JSON__;
const commits = data.commits || [];
let selected = data.selectedHash || (commits.length ? commits[0].hash : null);

const esc = (t='') => t.replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
const clip = (t='', l=88) => t.length > l ? t.slice(0,l) + '…' : t;

function pick(hash){
  selected = hash;
  paintRibbon();
  paintDetails();
  paintGraph();
  window.location.href = `analyzeapp://select/${hash}`;
}

function askAi(hash){ window.location.href = `analyzeapp://ai/${hash}`; }

function paintRibbon(){
  const el = document.getElementById('ribbon');
  const top = el.scrollTop;
  el.innerHTML = commits.map((c) => `
    <div class="r-item ${c.hash===selected?'active':''}" onclick="pick('${c.hash}')">
      <div class="hash">${esc(c.shortHash)}</div>
      <div class="meta">${esc(c.author)} • ${esc(c.date)}</div>
      <div class="msg">${esc(clip(c.message || '(без сообщения)'))}</div>
    </div>`).join('') || '<div class="empty">Нет коммитов</div>';
  el.scrollTop = top;
}

function paintDetails(){
  const el = document.getElementById('details');
  const commit = commits.find(c => c.hash === selected);
  if(!commit){ el.innerHTML = '<div class="empty">Выберите коммит на графе или в ленте.</div>'; return; }
  el.innerHTML = `
    <div class="badge">${esc(commit.shortHash)}</div>
    <h3 style="margin:10px 0 4px">${esc(commit.message || '(без сообщения)')}</h3>
    <div class="meta">${esc(commit.author)} • ${esc(commit.date)}</div>
    <div class="desc">${esc(commit.description || 'Описание пока не сгенерировано.')}</div>
    <div class="action">Предложение: сделать AI-обзор этого коммита в AnalyzeApp.
      <br/><button onclick="askAi('${commit.hash}')">Сделать AI-обзор</button>
    </div>`;
}

function paintGraph(){
  const wrap = document.getElementById('graphScroll');
  const oldTop = wrap.scrollTop;
  const oldLeft = wrap.scrollLeft;
  const svg = document.getElementById('graph');
  const w = Math.max(760, wrap.clientWidth - 16);
  const count = Math.max(commits.length, 1);
  const h = Math.max(wrap.clientHeight - 16, 90 + count * 82);
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
  svg.setAttribute('height', h);

  const laneCount = Math.min(4, Math.max(2, Math.ceil(Math.sqrt(count/2))));
  const laneX = i => 120 + i * ((w-240)/Math.max(1, laneCount-1));
  const stepY = Math.max(72, (h-90) / count);

  let branch = 0;
  const nodes = commits.map((c, i) => {
    if(i > 0 && i % 5 === 0) branch = (branch + 1) % laneCount;
    return { ...c, x: laneX(branch), y: 45 + i * stepY };
  });

  const lines = nodes.slice(0,-1).map((a, i) => {
    const b = nodes[i+1];
    const color = i%2===0 ? '#79afff' : '#67ffd3';
    return `<path d="M ${a.x} ${a.y+18} C ${a.x} ${(a.y+b.y)/2}, ${b.x} ${(a.y+b.y)/2}, ${b.x} ${b.y-18}" stroke="${color}" stroke-width="2" fill="none" opacity="0.8"/>`;
  }).join('');

  const cards = nodes.map((n) => {
    const active = n.hash === selected;
    const x = n.x - 94, y = n.y - 22;
    return `<g class="commit-card" onclick="pick('${n.hash}')">
      <rect x="${x}" y="${y}" rx="12" ry="12" width="188" height="44" fill="${active ? 'rgba(90,146,235,.25)' : 'rgba(12,24,48,.85)'}" stroke="${active ? '#7cb2ff' : '#36578d'}"/>
      <circle cx="${x+16}" cy="${y+22}" r="5" fill="${active ? '#74ffd2' : '#a9c8ff'}"/>
      <text x="${x+30}" y="${y+19}" font-size="11" fill="#dce8ff" font-weight="700">${esc(n.shortHash)}</text>
      <text x="${x+30}" y="${y+33}" font-size="10" fill="#9fb8dd">${esc(clip(n.message, 24))}</text>
    </g>`;
  }).join('');

  svg.innerHTML = `${lines}${cards}`;
  wrap.scrollTop = oldTop;
  wrap.scrollLeft = oldLeft;
}

paintRibbon();
paintDetails();
paintGraph();
addEventListener('resize', paintGraph, {passive:true});
</script>
</body>
</html>
