<!doctype html><html lang="ru"><head><meta charset="utf-8" />
<style>
body{font-family:Inter,Segoe UI,sans-serif;background:#0a1020;color:#eaf0ff;margin:0;padding:16px}
.grid{display:grid;grid-template-columns:1.5fr 1fr;gap:14px}
.panel{background:#121d37;border:1px solid #2c3f6b;border-radius:14px;padding:14px}
.item{padding:10px;border-bottom:1px solid #25385f}
.item:last-child{border-bottom:none}
.hash{font-weight:700;color:#9ec1ff}.meta{font-size:12px;color:#9bb0d6}
.msg{margin-top:6px}
pre{background:#0b1428;border-radius:8px;padding:10px;white-space:pre-wrap}
</style></head><body><div id="app"></div>
<script>
const data = __DATA_JSON__;
const items = data.commits.map(c => `<div class="item"><div class="hash">${c.shortHash}</div><div class="meta">${c.author} • ${c.date}</div><div class="msg">${c.message}</div></div>`).join('');
document.getElementById('app').innerHTML = `<div class="grid"><section class="panel"><h3>Лента коммитов</h3>${items || '<div class="meta">Нет коммитов</div>'}</section><section class="panel"><h3>AI summary</h3><pre>${data.summary || 'Выберите коммит и нажмите «Описание (Ollama)»'}</pre></section></div>`;
</script></body></html>
